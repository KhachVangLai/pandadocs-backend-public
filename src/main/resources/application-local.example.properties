# Copy this file to application-local.properties and keep the copy out of git.
# Start the app with the local profile:
#   .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=local"

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/pandadocs
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password

# JWT
pandadocs.app.jwtSecret=your_base64_or_long_random_jwt_secret
pandadocs.app.jwtExpirationMs=86400000

# Firebase
# Option 1: local ignored file under ./secrets
firebase.credentials.path=secrets/firebase-service-account.json
# Option 2: leave firebase.credentials.path blank and provide FIREBASE_CREDENTIALS_BASE64
# Option 3: rely on Google Application Default Credentials in cloud
firebase.storage.bucket=your-firebase-bucket.appspot.com

# PayOS
payos.client-id=your_payos_client_id
payos.api-key=your_payos_api_key
payos.checksum-key=your_payos_checksum_key
payos.return-url=http://localhost:5173/payment/success
payos.cancel-url=http://localhost:5173/payment/cancel
payos.webhook-url=http://localhost:8080/api/payments/payos-webhook

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=your_google_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_client_secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
app.oauth2.frontend-redirect-url=http://localhost:5173/oauth2/redirect

# Frontend / CORS
app.cors.allowed-origins=http://localhost:5173
app.frontend.base-url=http://localhost:5173

# Mail
spring.mail.host=smtp.sendgrid.net
spring.mail.port=2525
spring.mail.username=apikey
spring.mail.password=your_mail_password
mail.from.email=no-reply@example.com

# Gemini
gemini.api.key=your_gemini_api_key
gemini.api.model=gemini-2.5-flash

# Chat
chat.rate-limit.messages-per-hour=10
chat.rate-limit.messages-per-day=30
chat.session.timeout-minutes=30
chat.session.max-messages=50
chat.auto-title.enabled=true
