apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: your-service-name
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
        autoscaling.knative.dev/minScale: '1'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 600
      serviceAccountName: your-service-account@your-project-id.iam.gserviceaccount.com
      containers:
      - image: gcr.io/your-gcp-project/your-image:v1
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SERVER_PORT
          value: "8080"
        - name: JWT_EXPIRATION_MS
          value: "86400000"
        - name: PAYOS_RETURN_URL
          value: "https://your-frontend.example.com/payment/success"
        - name: PAYOS_CANCEL_URL
          value: "https://your-frontend.example.com/payment/cancel"
        - name: OAUTH2_FRONTEND_REDIRECT_URL
          value: "https://your-frontend.example.com/oauth2/redirect"
        - name: FIREBASE_CREDENTIALS_PATH
          value: "/secrets/firebase-service-account.json"
        - name: CORS_ALLOWED_ORIGINS
          value: "https://your-frontend.example.com,http://localhost:5173"
        - name: PAYOS_WEBHOOK_URL
          value: "https://your-api.example.com/api/payments/payos-webhook"
        - name: GOOGLE_REDIRECT_URI
          value: "https://your-api.example.com/login/oauth2/code/google"
        - name: MAIL_HOST
          value: "smtp.sendgrid.net"
        - name: MAIL_PORT
          value: "2525"
        - name: MAIL_USERNAME
          value: "apikey"
        - name: MAIL_FROM_EMAIL
          value: "pandadocs6204@gmail.com"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: database-url
              key: latest
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-username
              key: latest
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-password
              key: latest
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: latest
        - name: PAYOS_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: payos-client-id
              key: latest
        - name: PAYOS_API_KEY
          valueFrom:
            secretKeyRef:
              name: payos-api-key
              key: latest
        - name: PAYOS_CHECKSUM_KEY
          valueFrom:
            secretKeyRef:
              name: payos-checksum-key
              key: latest
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: google-client-id
              key: latest
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: google-oauth-secret
              key: latest
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: supabase-url
              key: latest
        - name: SUPABASE_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-key
              key: latest
        - name: FIREBASE_STORAGE_BUCKET
          valueFrom:
            secretKeyRef:
              name: firebase-bucket
              key: latest
        - name: MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mail-password
              key: latest
        - name: FRONTEND_BASE_URL
          valueFrom:
            secretKeyRef:
              name: frontend-base-url
              key: latest
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
        volumeMounts:
        - name: firebase-credentials
          mountPath: /secrets
          readOnly: true
      volumes:
      - name: firebase-credentials
        secret:
          secretName: firebase-credentials
          items:
          - key: latest
            path: firebase-service-account.json
